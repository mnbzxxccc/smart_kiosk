<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - أخبار الجامعة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 3rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 15px; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .back-link { display: inline-block; margin-top: 1.5rem; color: #64748b; text-decoration: none; }
        .status-msg { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
        .status-success { background: #dcfce7; color: #166534; }
        .status-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1><i class="fa-solid fa-lock"></i> لوحة إدارة الأخبار</h1>
        <p>استخدم هذا النموذج لإضافة إعلان أو خبر جديد يظهر على شاشة الكشك.</p>
        
        <form id="newsForm">
            <div class="form-group">
                <label>عنوان الخبر</label>
                <input type="text" id="title" placeholder="أدخل عنواناً جذاباً..." required>
            </div>
            <div class="form-group">
                <label>رابط الصورة (اختياري)</label>
                <input type="url" id="image_url" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-group">
                <label>محتوى الخبر</label>
                <textarea id="content" rows="6" placeholder="اكتب تفاصيل الخبر هنا..." required></textarea>
            </div>
            <button type="submit" id="submitBtn">نشر الخبر الآن</button>
        </form>
        
        <div id="status" class="status-msg"></div>
        
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-right"></i> العودة للكشك</a>
    </div>

    <script src="admin.js"></script>
</body>
</html>
